<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos AI Sentinel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #161b22;
            width: 100%;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #30363d;
            margin-bottom: 20px;
        }
        #viewer-container {
            position: relative;
            width: 640px;
            height: 480px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #30363d;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .status-panel {
            margin-top: 20px;
            padding: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 5px;
            width: 80%;
            max-width: 600px;
        }
        .alert {
            color: #f85149;
            font-weight: bold;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ARGOS AI: SENTINEL V1.0</h1>
    </header>

    <div id="viewer-container">
        <video id="webcam" autoplay playsinline width="640" height="480"></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="status-panel">
        <p id="status">INICIALIZANDO SISTEMA...</p>
        <div id="detections">Esperando señal de video...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        const ctx = canvas.getContext('2d');

        async function init() {
            try {
                status.innerText = "CARGANDO MODELO IA...";
                
                // Cargamos el modelo. Si usas GitHub Pages, asegúrate de que la ruta sea correcta.
                const model = await tf.loadGraphModel('model.json');
                
                status.innerText = "SISTEMA ACTIVO - VIGILANDO";

                // Acceso a la cámara trasera optimizado para móviles
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    detectFrame(model);
                };
            } catch (e) {
                status.innerText = "ERROR DE SISTEMA: " + e.message;
                console.error(e);
            }
        }

        async function detectFrame(model) {
            // Empaquetamos todo en tf.tidy para evitar fugas de memoria (memory leaks)
            tf.tidy(() => {
                // 1. Convertimos el frame en tensor
                // 2. Redimensionamos a 640x640 (lo que espera YOLO)
                // 3. Normalizamos los píxeles de 0-255 a 0-1
                const tensor = tf.browser.fromPixels(video)
                    .resizeNearestNeighbor([640, 640])
                    .toFloat()
                    .div(tf.scalar(255.0)) 
                    .expandDims();

                // Ejecutamos la predicción
                model.executeAsync(tensor).then(predictions => {
                    // Limpiamos el canvas
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Indicador de escaneo (cuadrado verde en la esquina)
                    ctx.strokeStyle = "#00ff00";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(20, 20, 40, 40); 

                    // Liberamos los tensores de la predicción
                    if (Array.isArray(predictions)) {
                        predictions.forEach(p => p.dispose());
                    } else {
                        predictions.dispose();
                    }
                });
            });

            requestAnimationFrame(() => detectFrame(model));
        }

        init();
    </script>
</body>
</html>
