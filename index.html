<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos AI Sentinel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background-color: #161b22; width: 100%; padding: 10px; text-align: center; border-bottom: 2px solid #30363d; }
        #viewer-container { position: relative; width: 90vw; max-width: 640px; aspect-ratio: 4/3; background: #000; margin-top: 20px; border: 2px solid #30363d; border-radius: 8px; overflow: hidden; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .status-panel { margin-top: 20px; padding: 15px; background: #161b22; border: 1px solid #30363d; border-radius: 5px; width: 85%; max-width: 600px; font-family: monospace; }
        .active { color: #39d353; }
        .error { color: #f85149; }
    </style>
</head>
<body>
    <header><h1>ARGOS AI: SENTINEL V1.0</h1></header>
    
    <div id="viewer-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="status-panel">
        <p id="status">SISTEMA: INICIALIZANDO...</p>
        <div id="log">Cargando 3 shards de memoria...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        const log = document.getElementById('log');
        const ctx = canvas.getContext('2d');

        async function init() {
            try {
                // Cargamos el modelo (el .json buscará los 3 .bin automáticamente)
                const model = await tf.loadGraphModel('model.json');
                
                status.innerText = "SISTEMA: ONLINE";
                status.className = "active";
                log.innerText = "Modelo YOLO cargado. Iniciando cámara...";

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    detect(model); // Aquí llamamos a la función de detección
                };
            } catch (e) {
                status.innerText = "SISTEMA: ERROR";
                status.className = "error";
                log.innerText = e.message;
            }
        }

        // AQUÍ ES DONDE VA LA FUNCIÓN POR LA QUE PREGUNTASTE:
        async function detect(model) {
            const predictions = await tf.tidy(() => {
                const img = tf.browser.fromPixels(video)
                    .resizeNearestNeighbor([640, 640])
                    .toFloat()
                    .div(255.0)
                    .expandDims(0);
                return model.executeAsync(img);
            });

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cuadro de escaneo visual
            ctx.strokeStyle = "#39d353";
            ctx.lineWidth = 3;
            ctx.strokeRect(50, 50, canvas.width - 100, canvas.height - 100);

            // Liberamos memoria de las predicciones
            if (predictions) {
                if (Array.isArray(predictions)) predictions.forEach(t => t.dispose());
                else predictions.dispose();
            }

            requestAnimationFrame(() => detect(model));
        }

        init();
    </script>
</body>
</html>
