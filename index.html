<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos AI Sentinel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        header {
            background-color: #161b22;
            width: 100%;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #30363d;
            margin-bottom: 20px;
        }
        #viewer-container {
            position: relative;
            width: 90vw;
            max-width: 640px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #30363d;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .status-panel {
            margin-top: 20px;
            padding: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 5px;
            width: 85%;
            max-width: 600px;
        }
        #status { font-weight: bold; }
        .loading { color: #f1e05a; }
        .active { color: #39d353; }
        .error { color: #f85149; }
    </style>
</head>
<body>

    <header>
        <h1>ARGOS AI: SENTINEL V1.0</h1>
    </header>

    <div id="viewer-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="status-panel">
        <p id="status" class="loading">INICIALIZANDO SISTEMA...</p>
        <div id="detections">Esperando acceso a periféricos...</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const status = document.getElementById('status');
        const ctx = canvas.getContext('2d');

        async function init() {
            try {
                status.innerText = "CONECTANDO CON MOTOR IA...";
                
                // Cargamos el modelo con una configuración de reintento para Safari
                const model = await tf.loadGraphModel('model.json', {
                    onProgress: (p) => {
                        status.innerText = `CARGANDO: ${Math.round(p * 100)}%`;
                    }
                });
                
                status.innerText = "SISTEMA ACTIVO";
                status.className = "active";

                // Configuración de cámara trasera
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    detectFrame(model);
                };
            } catch (e) {
                status.innerText = "FALLO TÉCNICO: " + e.message;
                status.className = "error";
                console.error(e);
            }
        }

        async function detectFrame(model) {
            // tf.tidy limpia automáticamente los tensores para no saturar el iPhone
            const predictions = await tf.tidy(() => {
                const input = tf.browser.fromPixels(video)
                    .resizeNearestNeighbor([640, 640])
                    .toFloat()
                    .div(255.0) // Normalización crucial para YOLO
                    .expandDims(0);
                
                return model.executeAsync(input);
            });

            // Limpieza y dibujo básico
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cuadro de escaneo visual
            ctx.strokeStyle = "#39d353";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            ctx.setLineDash([]);

            // Liberamos la predicción de la memoria
            if (Array.isArray(predictions)) {
                predictions.forEach(p => p.dispose());
            } else {
                predictions.dispose();
            }

            requestAnimationFrame(() => detectFrame(model));
        }

        // Arrancar aplicación
        init();
    </script>
</body>
</html>
